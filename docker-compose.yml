services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # Pulls qwen2.5:0.5b into the ollama service on first run (~400 MB).
  # Subsequent starts skip the download (model is cached in the volume).
  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen2.5:0.5b"]
    restart: "no"

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      model-init:
        condition: service_completed_successfully
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHINESE_ROOM_PROVIDER=ollama
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-disabled}
      - LANG=C.utf8
      - LC_ALL=C.utf8

volumes:
  ollama_data:
