server:
  port: 8080

spring:
  main:
    banner-mode: off
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-haiku-4-5
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.2
    google:
      genai:
        api-key: ${GEMINI_API_KEY:disabled}
        chat:
          options:
            model: gemini-2.0-flash

vaadin:
  productionMode: true
  eagerServerLoad: true

chinese-room:
  model: claude-haiku-4-5
  provider: anthropic

logging:
  level:
    com.sfryslie: INFO
    org.springframework.ai: WARN
    org.springframework: WARN
    com.vaadin: WARN
    org.atmosphere: WARN
